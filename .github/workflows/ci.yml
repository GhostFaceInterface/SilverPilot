name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_vps_smoke:
        description: "Run VPS deploy and smoke validation"
        required: true
        default: false
        type: boolean

concurrency:
  group: silverpilot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install libgomp dependency
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m pip install -r requirements.txt

      - name: Run Ruff Linter
        run: python -m ruff check apps/api
        working-directory: .

      - name: Run Ruff Formatter check
        run: python -m ruff format --check apps/api
        working-directory: .

      - name: Run tests
        run: python -m pytest tests

  compose-validation:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate default Compose config
        run: docker compose config

      - name: Validate collector profile Compose config
        run: docker compose --profile collector config

  api-image-build:
    name: API image build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - compose-validation
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build API image
        run: docker compose build api

  vps-smoke:
    name: VPS deploy and smoke validation
    runs-on: ubuntu-latest
    needs:
      - api-image-build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_vps_smoke)
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
      VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH || '/opt/silverpilot/SilverPilot' }}
    steps:
      - name: Validate required VPS secrets
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy latest main and run smoke checks
        run: |
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" "cd '$VPS_PROJECT_PATH' && \
            git pull --ff-only && \
            bash scripts/vps_smoke.sh"
