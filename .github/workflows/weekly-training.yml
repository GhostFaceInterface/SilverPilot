name: Weekly ML Model Training

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: silverpilot-training-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ml-training:
    name: Offline ML Training & Evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Initialize Database Schema
        env:
          DATABASE_URL: sqlite:///weekly_training.db
        run: |
          python scripts/init_db.py

      - name: Seed Historical Training Data
        env:
          DATABASE_URL: sqlite:///weekly_training.db
        run: |
          python scripts/seed_training_data.py

      - name: Build Training Dataset
        env:
          DATABASE_URL: sqlite:///weekly_training.db
        run: |
          python scripts/build_dataset.py --version 1.0.0

      - name: Train ML Model (Challenger)
        env:
          DATABASE_URL: sqlite:///weekly_training.db
        run: |
          python scripts/train_model.py

      - name: Evaluate Challenger vs Champion
        env:
          DATABASE_URL: sqlite:///weekly_training.db
        run: |
          python scripts/evaluate_challenger.py

      - name: Upload MLflow Runs and Model Weights as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weekly-model-challenger-run
          path: |
            mlruns/
            data/models/champion_model.pkl
            data/datasets/v1.0.0/
            evaluation_report.md
          if-no-files-found: warn
          retention-days: 14
