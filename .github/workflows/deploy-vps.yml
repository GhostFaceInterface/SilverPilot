name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or exact SHA to deploy"
        required: true
        default: "main"

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve deploy SHA
        id: rev
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_PORT"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_USER"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/silverpilot_vps
          chmod 600 ~/.ssh/silverpilot_vps
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host silverpilot-vps
            HostName $VPS_HOST
            Port $VPS_PORT
            User $VPS_USER
            IdentityFile ~/.ssh/silverpilot_vps
            StrictHostKeyChecking yes
          EOF

      - name: Deploy exact SHA
        env:
          DEPLOY_SHA: ${{ steps.rev.outputs.sha }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
        run: |
          test -n "$VPS_PROJECT_PATH"
          cat > /tmp/silverpilot-deploy.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DEPLOY_SHA="$1"
          VPS_PROJECT_PATH="$2"
          cd "$VPS_PROJECT_PATH"
          git fetch origin "$DEPLOY_SHA" </dev/null
          git checkout --detach "$DEPLOY_SHA" </dev/null
          compose=(docker compose --env-file .env.production)
          backup_dir="$(dirname "$VPS_PROJECT_PATH")/backups"
          mkdir -p "$backup_dir"
          "${compose[@]}" exec -T postgres pg_dump -U silverpilot silverpilot > "$backup_dir/silverpilot-$DEPLOY_SHA.sql"
          SILVERPILOT_DEPLOYED_SHA="$DEPLOY_SHA" "${compose[@]}" build
          SILVERPILOT_DEPLOYED_SHA="$DEPLOY_SHA" "${compose[@]}" run --rm migrate
          SILVERPILOT_DEPLOYED_SHA="$DEPLOY_SHA" "${compose[@]}" up -d api worker
          "${compose[@]}" exec -T api python -c "from urllib.request import urlopen; print(urlopen('http://127.0.0.1:8000/api/v1/system/health', timeout=5).status)"
          EOF
          scp /tmp/silverpilot-deploy.sh silverpilot-vps:/tmp/silverpilot-deploy.sh
          ssh silverpilot-vps "bash /tmp/silverpilot-deploy.sh '$DEPLOY_SHA' '$VPS_PROJECT_PATH'"
