services:
  api:
    build:
      context: ./apps/api
    container_name: silverpilot-api
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-SilverPilot}
      APP_DEBUG: ${APP_DEBUG:-false}
      INITIAL_BALANCE_USD: ${INITIAL_BALANCE_USD:-600}
      REAL_MONEY_ENABLED: ${REAL_MONEY_ENABLED:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://silverpilot:change_me@postgres:5432/silverpilot}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    profiles: ["collector"]
    build:
      context: ./apps/api
    container_name: silverpilot-collector
    command: ["python", "-m", "app.collectors.runner", "--loop"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://silverpilot:change_me@postgres:5432/silverpilot}
      COLLECTOR_INTERVAL_SECONDS: ${COLLECTOR_INTERVAL_SECONDS:-900}
      MANUAL_PRICE_SOURCE_TYPE: ${MANUAL_PRICE_SOURCE_TYPE:-bank}
      MANUAL_PRICE_SOURCE: ${MANUAL_PRICE_SOURCE:-manual-scheduled}
      MANUAL_PRICE_ASSET_SYMBOL: ${MANUAL_PRICE_ASSET_SYMBOL:-XAG}
      MANUAL_PRICE_BUY_PRICE: ${MANUAL_PRICE_BUY_PRICE:-10.00}
      MANUAL_PRICE_SELL_PRICE: ${MANUAL_PRICE_SELL_PRICE:-9.80}
      MANUAL_PRICE_CURRENCY: ${MANUAL_PRICE_CURRENCY:-USD}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: silverpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-silverpilot}
      POSTGRES_USER: ${POSTGRES_USER:-silverpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silverpilot -d silverpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
