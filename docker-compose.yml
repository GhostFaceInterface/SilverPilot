name: silverpilot

x-app-environment: &app-environment
  SILVERPILOT_APP_NAME: ${SILVERPILOT_APP_NAME:-${APP_NAME:-SilverPilot}}
  SILVERPILOT_ENVIRONMENT: ${SILVERPILOT_ENVIRONMENT:-production}
  SILVERPILOT_LOG_LEVEL: ${SILVERPILOT_LOG_LEVEL:-INFO}
  SILVERPILOT_DATABASE_URL: ${SILVERPILOT_DATABASE_URL:-${DATABASE_URL:-postgresql+psycopg://silverpilot:silverpilot_dev_password@postgres:5432/silverpilot}}
  SILVERPILOT_TELEGRAM_ENABLED: ${SILVERPILOT_TELEGRAM_ENABLED:-false}
  SILVERPILOT_TELEGRAM_BOT_TOKEN: ${SILVERPILOT_TELEGRAM_BOT_TOKEN:-${TELEGRAM_BOT_TOKEN:-}}
  SILVERPILOT_TELEGRAM_DEFAULT_CHAT_ID: ${SILVERPILOT_TELEGRAM_DEFAULT_CHAT_ID:-${TELEGRAM_CHAT_ID:-}}
  SILVERPILOT_TELEGRAM_API_BASE_URL: ${SILVERPILOT_TELEGRAM_API_BASE_URL:-https://api.telegram.org}
  SILVERPILOT_DEPLOYED_SHA: ${SILVERPILOT_DEPLOYED_SHA:-}
  SILVERPILOT_RUNTIME_ENABLED: ${SILVERPILOT_RUNTIME_ENABLED:-false}
  SILVERPILOT_RUNTIME_ACCOUNT_ID: ${SILVERPILOT_RUNTIME_ACCOUNT_ID:-}
  SILVERPILOT_RUNTIME_BANK_INSTRUMENT_ID: ${SILVERPILOT_RUNTIME_BANK_INSTRUMENT_ID:-}
  SILVERPILOT_RUNTIME_EXECUTION_INSTRUMENT_ID: ${SILVERPILOT_RUNTIME_EXECUTION_INSTRUMENT_ID:-}
  SILVERPILOT_RUNTIME_REFERENCE_INSTRUMENT_ID: ${SILVERPILOT_RUNTIME_REFERENCE_INSTRUMENT_ID:-}
  SILVERPILOT_RUNTIME_STRATEGY_ID: ${SILVERPILOT_RUNTIME_STRATEGY_ID:-}
  SILVERPILOT_RUNTIME_REFERENCE_SOURCE: ${SILVERPILOT_RUNTIME_REFERENCE_SOURCE:-}
  SILVERPILOT_RUNTIME_FX_SOURCE: ${SILVERPILOT_RUNTIME_FX_SOURCE:-}
  SILVERPILOT_RUNTIME_FX_PAIR: ${SILVERPILOT_RUNTIME_FX_PAIR:-USDTRY}
  SILVERPILOT_RUNTIME_REFERENCE_TIMEFRAME: ${SILVERPILOT_RUNTIME_REFERENCE_TIMEFRAME:-4h}
  SILVERPILOT_INDICATOR_SOURCE_POLICY: ${SILVERPILOT_INDICATOR_SOURCE_POLICY:-reference_market_first}
  SILVERPILOT_EXECUTION_SOURCE_POLICY: ${SILVERPILOT_EXECUTION_SOURCE_POLICY:-account_bound_bank_quote}
  SILVERPILOT_REFERENCE_DELAY_POLICY: ${SILVERPILOT_REFERENCE_DELAY_POLICY:-provider_delayed}
  SILVERPILOT_REFERENCE_INGESTION_DELAY_SECONDS: ${SILVERPILOT_REFERENCE_INGESTION_DELAY_SECONDS:-60}
  SILVERPILOT_EXECUTION_QUOTE_SELECTION_POLICY: ${SILVERPILOT_EXECUTION_QUOTE_SELECTION_POLICY:-latest_before_or_at_decision}
  SILVERPILOT_MAX_QUOTE_LAG_SECONDS: ${SILVERPILOT_MAX_QUOTE_LAG_SECONDS:-300}
  SILVERPILOT_RUNTIME_COLLECT_INTERVAL_SECONDS: ${SILVERPILOT_RUNTIME_COLLECT_INTERVAL_SECONDS:-300}
  SILVERPILOT_RUNTIME_BAR_TIMEFRAME: ${SILVERPILOT_RUNTIME_BAR_TIMEFRAME:-5m}
  SILVERPILOT_RUNTIME_WARMUP_BARS: ${SILVERPILOT_RUNTIME_WARMUP_BARS:-201}
  SILVERPILOT_RUNTIME_EXIT_STOP_LOSS_PCT: ${SILVERPILOT_RUNTIME_EXIT_STOP_LOSS_PCT:--0.03}
  SILVERPILOT_RUNTIME_EXIT_TAKE_PROFIT_PCT: ${SILVERPILOT_RUNTIME_EXIT_TAKE_PROFIT_PCT:-0.05}
  SILVERPILOT_RUNTIME_EXIT_HIGH_VOLATILITY_FRACTION: ${SILVERPILOT_RUNTIME_EXIT_HIGH_VOLATILITY_FRACTION:-0.5}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-silverpilot}
      POSTGRES_USER: ${POSTGRES_USER:-silverpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-silverpilot_dev_password}
    ports:
      - "127.0.0.1:${SILVERPILOT_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_rebuild_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
    environment:
      <<: *app-environment
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
    environment:
      <<: *app-environment
    ports:
      - "127.0.0.1:${SILVERPILOT_API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
    environment:
      <<: *app-environment
    command: ["silverpilot-paper-loop"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  telegram:
    profiles: ["telegram"]
    build:
      context: .
    environment:
      <<: *app-environment
    command: ["silverpilot-telegram-bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  collector:
    profiles: ["collector"]
    build:
      context: .
    environment:
      <<: *app-environment
    command:
      [
        "silverpilot-collect-kuveyt",
        "--bank-instrument-id",
        "${SILVERPILOT_COLLECTOR_BANK_INSTRUMENT_ID:-00000000-0000-0000-0000-000000000000}",
        "--repeat",
        "${SILVERPILOT_COLLECTOR_REPEAT:-1}",
        "--interval-seconds",
        "${SILVERPILOT_COLLECTOR_INTERVAL_SECONDS:-60}",
      ]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_rebuild_data:
