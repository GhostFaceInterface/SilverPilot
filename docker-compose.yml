services:
  api:
    build:
      context: ./apps/api
    container_name: silverpilot-api
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_NAME: ${APP_NAME:-SilverPilot}
      APP_DEBUG: ${APP_DEBUG:-false}
      INITIAL_BALANCE_USD: ${INITIAL_BALANCE_USD:-600}
      REAL_MONEY_ENABLED: ${REAL_MONEY_ENABLED:-false}
      RISK_DATA_STALE_AFTER_MINUTES: ${RISK_DATA_STALE_AFTER_MINUTES:-60}
      RISK_MAX_SPREAD_PERCENT: ${RISK_MAX_SPREAD_PERCENT:-5.0}
      RISK_MAX_24H_VOLATILITY_PERCENT: ${RISK_MAX_24H_VOLATILITY_PERCENT:-12.0}
      RISK_MAX_7D_VOLATILITY_PERCENT: ${RISK_MAX_7D_VOLATILITY_PERCENT:-25.0}
      RISK_FOMO_LOOKBACK_MINUTES: ${RISK_FOMO_LOOKBACK_MINUTES:-180}
      RISK_FOMO_RISE_PERCENT: ${RISK_FOMO_RISE_PERCENT:-6.0}
      RISK_MAX_DAILY_LOSS_USD: ${RISK_MAX_DAILY_LOSS_USD:-30.0}
      RISK_MAX_WEEKLY_LOSS_USD: ${RISK_MAX_WEEKLY_LOSS_USD:-60.0}
      RISK_MIN_EXPECTED_NET_GAIN_PERCENT: ${RISK_MIN_EXPECTED_NET_GAIN_PERCENT:-0.0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://silverpilot:change_me@postgres:5432/silverpilot}
      COLLECTOR_USER_AGENT: ${COLLECTOR_USER_AGENT:-SilverPilot/0.1 public-source paper-trading collector}
      KUVEYT_SILVER_URL: ${KUVEYT_SILVER_URL:-https://www.kuveytturk.com.tr/kendim-icin/yatirim-urunleri/hazine-urunleri/canli-gumus-fiyatlari-ve-gram-gumus-hesaplama}
      GLOBAL_XAG_SOURCE_PRIORITY: ${GLOBAL_XAG_SOURCE_PRIORITY:-yahoo-si-f,metals-dev}
      GLOBAL_XAG_FRESHNESS_MINUTES: ${GLOBAL_XAG_FRESHNESS_MINUTES:-90}
      STOOQ_XAG_USD_URL: ${STOOQ_XAG_USD_URL:-https://stooq.com/q/l/?s=xagusd&f=sd2t2ohlcv&h&e=csv}
      STOOQ_XAG_USD_TIMEOUT_SECONDS: ${STOOQ_XAG_USD_TIMEOUT_SECONDS:-10}
      STOOQ_XAG_USD_RETRIES: ${STOOQ_XAG_USD_RETRIES:-2}
      STOOQ_XAG_USD_BACKOFF_SECONDS: ${STOOQ_XAG_USD_BACKOFF_SECONDS:-1}
      GOLD_API_XAG_USD_ENABLED: ${GOLD_API_XAG_USD_ENABLED:-true}
      GOLD_API_XAG_USD_URL: ${GOLD_API_XAG_USD_URL:-https://api.gold-api.com/price/XAG}
      GOLD_API_XAG_USD_TIMEOUT_SECONDS: ${GOLD_API_XAG_USD_TIMEOUT_SECONDS:-10}
      METALS_DEV_API_KEY: ${METALS_DEV_API_KEY:-}
      METALS_DEV_SPOT_URL: ${METALS_DEV_SPOT_URL:-https://api.metals.dev/v1/metal/spot}
      METALS_DEV_TIMEOUT_SECONDS: ${METALS_DEV_TIMEOUT_SECONDS:-10}
      TCMB_TODAY_XML_URL: ${TCMB_TODAY_XML_URL:-https://www.tcmb.gov.tr/kurlar/today.xml}
      FED_RSS_ENABLED: ${FED_RSS_ENABLED:-true}
      FED_RSS_URL: ${FED_RSS_URL:-https://www.federalreserve.gov/feeds/press_monetary.xml}
      BLS_API_KEY: ${BLS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRED_API_BASE_URL: ${FRED_API_BASE_URL:-https://api.stlouisfed.org/fred}
      FRED_SERIES_IDS: ${FRED_SERIES_IDS:-CPIAUCSL,PPIACO,UNRATE,FEDFUNDS,DGS10,DTWEXBGS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_DAILY_BUDGET_USD: ${DEEPSEEK_DAILY_BUDGET_USD:-1.00}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      HERMES_VETO_THRESHOLD: ${HERMES_VETO_THRESHOLD:--0.45}
      WEIGHT_GLOBAL_AUTHORITY: ${WEIGHT_GLOBAL_AUTHORITY:-0.5}
      WEIGHT_LOCAL_EXPERT: ${WEIGHT_LOCAL_EXPERT:-0.3}
      WEIGHT_LOCAL_FORUM: ${WEIGHT_LOCAL_FORUM:-0.2}
      AGENT_HERMES_MODEL: ${AGENT_HERMES_MODEL:-deepseek-v4-pro}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-0}
      TELEGRAM_BOT_MODE: ${TELEGRAM_BOT_MODE:-polling}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    profiles: ["collector"]
    build:
      context: ./apps/api
    container_name: silverpilot-collector
    command: ["python", "-m", "app.collectors.runner", "--loop"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://silverpilot:change_me@postgres:5432/silverpilot}
      COLLECTOR_INTERVAL_SECONDS: ${COLLECTOR_INTERVAL_SECONDS:-900}
      COLLECTOR_JOB: ${COLLECTOR_JOB:-kuveyt-silver}
      COLLECTOR_JOBS: ${COLLECTOR_JOBS:-kuveyt-silver,global-xag-usd,tcmb-usd-try,fed-rss,fred-macro,hermes-agent,kitco-rss,bloomberght-rss,fxstreet-rss,investing-rss}
      COLLECTOR_USER_AGENT: ${COLLECTOR_USER_AGENT:-SilverPilot/0.1 public-source paper-trading collector}
      KUVEYT_SILVER_URL: ${KUVEYT_SILVER_URL:-https://www.kuveytturk.com.tr/kendim-icin/yatirim-urunleri/hazine-urunleri/canli-gumus-fiyatlari-ve-gram-gumus-hesaplama}
      GLOBAL_XAG_SOURCE_PRIORITY: ${GLOBAL_XAG_SOURCE_PRIORITY:-yahoo-si-f,metals-dev}
      GLOBAL_XAG_FRESHNESS_MINUTES: ${GLOBAL_XAG_FRESHNESS_MINUTES:-90}
      STOOQ_XAG_USD_URL: ${STOOQ_XAG_USD_URL:-https://stooq.com/q/l/?s=xagusd&f=sd2t2ohlcv&h&e=csv}
      STOOQ_XAG_USD_TIMEOUT_SECONDS: ${STOOQ_XAG_USD_TIMEOUT_SECONDS:-10}
      STOOQ_XAG_USD_RETRIES: ${STOOQ_XAG_USD_RETRIES:-2}
      STOOQ_XAG_USD_BACKOFF_SECONDS: ${STOOQ_XAG_USD_BACKOFF_SECONDS:-1}
      GOLD_API_XAG_USD_ENABLED: ${GOLD_API_XAG_USD_ENABLED:-true}
      GOLD_API_XAG_USD_URL: ${GOLD_API_XAG_USD_URL:-https://api.gold-api.com/price/XAG}
      GOLD_API_XAG_USD_TIMEOUT_SECONDS: ${GOLD_API_XAG_USD_TIMEOUT_SECONDS:-10}
      METALS_DEV_API_KEY: ${METALS_DEV_API_KEY:-}
      METALS_DEV_SPOT_URL: ${METALS_DEV_SPOT_URL:-https://api.metals.dev/v1/metal/spot}
      METALS_DEV_TIMEOUT_SECONDS: ${METALS_DEV_TIMEOUT_SECONDS:-10}
      TCMB_TODAY_XML_URL: ${TCMB_TODAY_XML_URL:-https://www.tcmb.gov.tr/kurlar/today.xml}
      FED_RSS_ENABLED: ${FED_RSS_ENABLED:-true}
      FED_RSS_URL: ${FED_RSS_URL:-https://www.federalreserve.gov/feeds/press_monetary.xml}
      MANUAL_PRICE_SOURCE_TYPE: ${MANUAL_PRICE_SOURCE_TYPE:-bank}
      MANUAL_PRICE_SOURCE: ${MANUAL_PRICE_SOURCE:-manual-scheduled}
      MANUAL_PRICE_ASSET_SYMBOL: ${MANUAL_PRICE_ASSET_SYMBOL:-XAG}
      MANUAL_PRICE_BUY_PRICE: ${MANUAL_PRICE_BUY_PRICE:-10.00}
      MANUAL_PRICE_SELL_PRICE: ${MANUAL_PRICE_SELL_PRICE:-9.80}
      MANUAL_PRICE_CURRENCY: ${MANUAL_PRICE_CURRENCY:-USD}
      BLS_API_KEY: ${BLS_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      FRED_API_BASE_URL: ${FRED_API_BASE_URL:-https://api.stlouisfed.org/fred}
      FRED_SERIES_IDS: ${FRED_SERIES_IDS:-CPIAUCSL,PPIACO,UNRATE,FEDFUNDS,DGS10,DTWEXBGS}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_DAILY_BUDGET_USD: ${DEEPSEEK_DAILY_BUDGET_USD:-1.00}
      INITIAL_BALANCE_USD: ${INITIAL_BALANCE_USD:-600}
      REAL_MONEY_ENABLED: ${REAL_MONEY_ENABLED:-false}
      RISK_DATA_STALE_AFTER_MINUTES: ${RISK_DATA_STALE_AFTER_MINUTES:-60}
      RISK_MAX_SPREAD_PERCENT: ${RISK_MAX_SPREAD_PERCENT:-5.0}
      RISK_MAX_24H_VOLATILITY_PERCENT: ${RISK_MAX_24H_VOLATILITY_PERCENT:-12.0}
      RISK_MAX_7D_VOLATILITY_PERCENT: ${RISK_MAX_7D_VOLATILITY_PERCENT:-25.0}
      RISK_FOMO_LOOKBACK_MINUTES: ${RISK_FOMO_LOOKBACK_MINUTES:-180}
      RISK_FOMO_RISE_PERCENT: ${RISK_FOMO_RISE_PERCENT:-6.0}
      RISK_MAX_DAILY_LOSS_USD: ${RISK_MAX_DAILY_LOSS_USD:-30.0}
      RISK_MAX_WEEKLY_LOSS_USD: ${RISK_MAX_WEEKLY_LOSS_USD:-60.0}
      RISK_MIN_EXPECTED_NET_GAIN_PERCENT: ${RISK_MIN_EXPECTED_NET_GAIN_PERCENT:-0.0}
      STRATEGY_NAME: ${STRATEGY_NAME:-rsi}
      AUTO_TRADING_ENABLED: ${AUTO_TRADING_ENABLED:-true}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-0}
      TELEGRAM_BOT_MODE: ${TELEGRAM_BOT_MODE:-polling}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      AGENT_NEWS_MODEL: ${AGENT_NEWS_MODEL:-deepseek-v4-flash}
      AGENT_REPORT_MODEL: ${AGENT_REPORT_MODEL:-deepseek-v4-flash}
      AGENT_RISK_MODEL: ${AGENT_RISK_MODEL:-deepseek-v4-pro}
      HERMES_VETO_THRESHOLD: ${HERMES_VETO_THRESHOLD:--0.45}
      WEIGHT_GLOBAL_AUTHORITY: ${WEIGHT_GLOBAL_AUTHORITY:-0.5}
      WEIGHT_LOCAL_EXPERT: ${WEIGHT_LOCAL_EXPERT:-0.3}
      WEIGHT_LOCAL_FORUM: ${WEIGHT_LOCAL_FORUM:-0.2}
      AGENT_HERMES_MODEL: ${AGENT_HERMES_MODEL:-deepseek-v4-pro}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    profiles: ["dashboard"]
    build:
      context: ./apps/dashboard
    container_name: silverpilot-dashboard
    environment:
      SILVERPILOT_API_BASE_URL: ${SILVERPILOT_API_BASE_URL:-http://api:8000}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN:-}
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: silverpilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-silverpilot}
      POSTGRES_USER: ${POSTGRES_USER:-silverpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:

      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
